  <circle cx="50" cy="22" r="7" fill="#f59e0b"/>
  <circle cx="74" cy="22" r="7" fill="#22c55e"/>
  <text x="105" y="27" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="14">aihelper doctor</text>
  <text x="34" y="84" fill="#93c5fd" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">$ ./bin/aihelper doctor</text>
  <text x="34" y="126" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">AIHELPER DIAGNOSTICS</text>
