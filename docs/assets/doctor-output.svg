<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">aihelper doctor output screenshot</title>
  <desc id="desc">Terminal-style diagnostic output showing healthy aihelper subsystems.</desc>
