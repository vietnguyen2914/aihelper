<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Operation latency: raw Python vs daemon IPC</title>
  <desc id="desc">Horizontal bar chart comparing raw Python startup latency to aihelper daemon latency for route, symbol_find, cache_status, context, and prompt assembly. Lower is better.</desc>
  <rect width="1100" height="620" rx="24" fill="#ffffff"/>
  <text x="56" y="66" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Operation Latency</text>
  <text x="56" y="100" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="16">Raw Python startup vs persistent daemon IPC on M1 Pro 32GB. Lower is better.</text>

  <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">
    <line x1="280" y1="142" x2="980" y2="142" stroke="#e2e8f0"/>
    <line x1="280" y1="498" x2="980" y2="498" stroke="#e2e8f0"/>
    <line x1="280" y1="142" x2="280" y2="498" stroke="#cbd5e1"/>
    <line x1="420" y1="142" x2="420" y2="498" stroke="#f1f5f9"/>
    <line x1="560" y1="142" x2="560" y2="498" stroke="#f1f5f9"/>
    <line x1="700" y1="142" x2="700" y2="498" stroke="#f1f5f9"/>
    <line x1="840" y1="142" x2="840" y2="498" stroke="#f1f5f9"/>
    <line x1="980" y1="142" x2="980" y2="498" stroke="#f1f5f9"/>
    <text x="280" y="526" text-anchor="middle">0ms</text>
    <text x="420" y="526" text-anchor="middle">100</text>
    <text x="560" y="526" text-anchor="middle">200</text>
    <text x="700" y="526" text-anchor="middle">300</text>
    <text x="840" y="526" text-anchor="middle">400</text>
    <text x="980" y="526" text-anchor="middle">500</text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="56" y="128" width="16" height="16" rx="3" fill="#ef4444"/>
    <text x="82" y="141" fill="#334155" font-size="14">Raw Python</text>
    <rect x="190" y="128" width="16" height="16" rx="3" fill="#10b981"/>
    <text x="216" y="141" fill="#334155" font-size="14">Daemon IPC</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="15">
    <text x="56" y="194" fill="#0f172a" font-weight="600">route</text>
    <rect x="280" y="170" width="228" height="18" rx="5" fill="#ef4444"/>
    <rect x="280" y="194" width="8" height="18" rx="5" fill="#10b981"/>
    <text x="522" y="185" fill="#334155">163ms</text>
    <text x="302" y="209" fill="#334155">0.7ms</text>

    <text x="56" y="264" fill="#0f172a" font-weight="600">symbol_find</text>
    <rect x="280" y="240" width="228" height="18" rx="5" fill="#ef4444"/>
    <rect x="280" y="264" width="8" height="18" rx="5" fill="#10b981"/>
    <text x="522" y="255" fill="#334155">163ms</text>
    <text x="302" y="279" fill="#334155">3.1ms</text>

    <text x="56" y="334" fill="#0f172a" font-weight="600">cache_status</text>
    <rect x="280" y="310" width="228" height="18" rx="5" fill="#ef4444"/>
    <rect x="280" y="334" width="8" height="18" rx="5" fill="#10b981"/>
    <text x="522" y="325" fill="#334155">163ms</text>
    <text x="302" y="349" fill="#334155">0.3ms</text>

    <text x="56" y="404" fill="#0f172a" font-weight="600">context</text>
    <rect x="280" y="380" width="228" height="18" rx="5" fill="#ef4444"/>
    <rect x="280" y="404" width="8" height="18" rx="5" fill="#10b981"/>
    <text x="522" y="395" fill="#334155">163ms</text>
    <text x="302" y="419" fill="#334155">0.5ms</text>

    <text x="56" y="474" fill="#0f172a" font-weight="600">prompt assembly</text>
    <rect x="280" y="450" width="700" height="18" rx="5" fill="#ef4444"/>
    <rect x="280" y="474" width="140" height="18" rx="5" fill="#10b981"/>
    <text x="994" y="465" fill="#334155">500ms+</text>
    <text x="434" y="489" fill="#334155">&lt;100ms</text>
  </g>

  <rect x="56" y="560" width="988" height="38" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="78" y="584" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">Takeaway: the daemon removes repeated Python cold-start cost, so routing/context calls stay interactive.</text>
</svg>
