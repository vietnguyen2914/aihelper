name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Doctor
        run: python context_engine/main.py doctor --json

      - name: Cache build
        run: python context_engine/main.py cache build --project-root demo --json

      - name: Route task
        run: python context_engine/main.py route "fix payment bug" --project-root demo --json

      - name: Daemon smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python context_engine/main.py daemon start --json
          python context_engine/main.py daemon status --json
          python context_engine/main.py daemon stop --json

      - name: Daemon smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python context_engine/main.py daemon start --json
          python context_engine/main.py daemon status --json
          python context_engine/main.py daemon stop --json

      - name: PowerShell launcher smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./bin/aihelper.ps1 doctor --json
