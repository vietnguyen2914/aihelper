name: "Release Check"
description: "Pre-release validation using primitives composition"
version: "1.1"

phases:
  - name: validate
    kind: deterministic
    uses: [test.run, lint.run, verify.architecture, graph.dependency_inspect, git.diff]
    description: "Run all deterministic checks in one phase"
    continue_on_failure: true

  - name: summarize
    kind: local_model
    model: qwen3.5:4b-16k
    prompt_template: |
      Summarize the release readiness:
      - Tests passed: {passed}
      - Lint issues: {issues}
      - Circular deps: {circular_deps}
      - Dead code: {dead_code}
      - Diff summary: {diff_stat}
      - Dependencies: {dep_count} deps

      Should we proceed with release? Give a brief recommendation.
