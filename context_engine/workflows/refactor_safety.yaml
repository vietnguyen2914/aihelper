name: "Refactor Safety"
description: "Pre-refactor safety analysis using primitives composition"
version: "1.1"

phases:
  - name: analyze
    kind: deterministic
    uses: [graph.analyze_target, graph.trace_callers, graph.trace_callees, risk.classify, memory.recall]
    description: "Full pre-refactor analysis in one composed phase"

  - name: strategy
    kind: frontier
    prompt_template: |
      Plan a safe refactoring strategy.

      Target: {target}
      Callers ({caller_count}): {caller_list}
      Callees ({callee_count}): {callee_list}
      Risk level: {risk_level}
      Historical bugs: {memories}

      Propose:
      1. Refactoring approach (extract, inline, rename, restructure)
      2. Migration steps (ordered, safe)
      3. Rollback plan
      4. Testing strategy to minimize regression risk
