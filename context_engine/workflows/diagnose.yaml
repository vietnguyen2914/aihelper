name: "Diagnose Bug"
description: "Disciplined diagnosis loop using primitives composition"
version: "1.1"

phases:
  - name: analyze
    kind: deterministic
    uses: [graph.analyze_target, memory.recall, graph.trace_callers, graph.trace_callees]
    description: "Trace target, recall memories, trace callers and callees"

  - name: hypothesize
    kind: local_model
    model: qwen3.5:4b-16k
    prompt_template: |
      You are diagnosing a bug.

      Target: {target}
      Callers: {caller_list}
      Callees: {callee_list}
      Historical bugs: {memories}

      Based on this context, what is the most likely root cause?
      Propose a fix with minimal code changes.

  - name: verify
    kind: deterministic
    uses: [test.run]
    description: "Run tests to verify the fix"
