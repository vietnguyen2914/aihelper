name: "TDD — Test-Driven Development"
description: "Red-green-refactor loop for a target module using primitives composition"
version: "1.1"

phases:
  - name: analyze
    kind: deterministic
    uses: [graph.analyze_target, memory.recall]
    description: "Trace dependencies and recall historical context"

  - name: generate_stub
    kind: deterministic
    uses: [test.generate_stub]
    description: "Generate minimal test file stub"

  - name: expect_red
    kind: deterministic
    uses: [test.run]
    description: "Run tests — expect RED (failing test)"

  - name: implement
    kind: local_model
    model: qwen3.5:4b-16k
    prompt_template: |
      Given:
      - Target: {target}
      - Callers: {caller_list}
      - Callees: {callee_list}
      - Test stub ready: {test_stub_ready}
      - Historical context: {memories}

      Implement the minimal code change to make the test pass.
      Focus on correctness, not optimization.

  - name: expect_green
    kind: deterministic
    uses: [test.run]
    description: "Run tests — expect GREEN"

  - name: regression
    kind: deterministic
    uses: [test.run]
    description: "Run full regression suite"
    continue_on_failure: true

  - name: summarize
    kind: deterministic
    uses: [graph.impact_radius, context.summarize]
    description: "Calculate impact radius and risk level"
