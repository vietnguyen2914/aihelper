name: "Architecture Review"
description: "Deep architecture analysis using primitives composition"
version: "1.1"

phases:
  - name: analyze
    kind: deterministic
    uses: [verify.architecture, memory.recall, git.diff, context.compress]
    description: "Full architecture scan + memory + git + compression"

  - name: report
    kind: frontier
    prompt_template: |
      You are reviewing the architecture of a codebase.

      Architecture state: {circular_deps} circular deps, {dead_code} dead symbols
      Historical decisions: {memories}
      Recent changes: {diff_stat}

      Provide:
      1. Overall architecture health assessment
      2. Top 3 risks
      3. Recommended improvements
      Be specific and actionable.
